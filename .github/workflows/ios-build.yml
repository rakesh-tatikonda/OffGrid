name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix ThirdParty submodules (strip main.swift / nested Package.swift)
        run: ./scripts/fix-thirdparty-submodules.sh

      - name: Select Xcode version
        # Binds the active platform terminal to Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install Missing iOS 18.2 Platform Runtime
        # This forces Apple's package engine to mount the missing 18.2 core layout on the runner.
        # This completely stops the "iOS 18.2 is not installed" block.
        run: xcodebuild -downloadPlatform iOS -buildVersion 18.2

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: List schemes (sanity check)
        run: xcodebuild -list -project OffGrid.xcodeproj

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OffGrid.xcodeproj \
            -scheme OffGrid \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS="arm64" \
            COMPILER_INDEX_STORE_ENABLE=NO
