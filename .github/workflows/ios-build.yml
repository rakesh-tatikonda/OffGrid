name: iOS Build and Export

# SECURITY-AUDITED VERSION — see docs/SECURITY_AUDIT.md (CI-01 … CI-06).
# Every original step is preserved; the signing-related ones are hardened.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the IPA to App Store Connect"
        type: boolean
        default: false
      skip_models:
        description: "Diagnostic build: skip model download, expect a ~20 MB IPA"
        type: boolean
        default: false

# CI-05: the original declared no `permissions:` block, so this job inherited
# the repository default GITHUB_TOKEN scope — read/write across contents,
# packages and issues on older repos. A build job only needs to read.
permissions:
  contents: read

env:
  # Single source of truth. Must match `name:` and the target name in project.yml.
  APP_NAME: CapSureTranscribe
  BUNDLE_ID: com.Fortress.CapSureTranscribe

jobs:
  build:
    name: Build and Sign IPA
    runs-on: macos-latest

    steps:
      # CI-04: TODO before you rely on this pipeline — pin these actions to an
      # immutable commit SHA, e.g.
      #     uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # A mutable tag can be re-pointed by whoever controls the action repo, and
      # this job hands that process every signing secret it holds. Tags are left
      # in place here so the workflow still runs unmodified; substitute SHAs you
      # have actually vetted.
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false      # CI-05: no token left in .git/config

      - name: Verify submodules were fetched
        run: |
          # If these are empty, the SwiftPM targets have no sources and the
          # build fails much later with a confusing error. Fail fast instead.
          for d in ThirdParty/whisper.cpp ThirdParty/llama.cpp; do
            if [ -z "$(ls -A "$d" 2>/dev/null)" ]; then
              echo "::error::$d is empty - submodule not checked out"
              exit 1
            fi
          done

      - name: Preflight - verify secrets are reaching this job
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # Prints only character counts, never values. A length of 0 means the
          # secret is not reaching this job - most often because it is an
          # *environment* secret and the job has no `environment:` key, or it
          # was created under the Variables tab instead of Secrets.
          fail=0
          for name in APPLE_TEAM_ID PROVISIONING_PROFILE_NAME P12_PASSWORD \
                      BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64; do
            eval "val=\${$name}"
            printf '%-32s length=%s\n' "$name" "${#val}"
            if [ -z "$val" ]; then fail=1; fi
          done

          # App Store Connect secrets are only needed when uploading, so these
          # are reported but never fail an ordinary build.
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            eval "val=\${$name}"
            printf '%-32s length=%s\n' "$name" "${#val}"
          done

          # Key IDs are 10 chars, issuer IDs are 36-char UUIDs. Catching a
          # swapped pair here saves a confusing 401 from altool later.
          if [ -n "$ASC_KEY_ID" ] && [ "${#ASC_KEY_ID}" -ne 10 ]; then
            echo "::warning::ASC_KEY_ID is ${#ASC_KEY_ID} chars; expected 10"
          fi
          if [ -n "$ASC_ISSUER_ID" ] && [ "${#ASC_ISSUER_ID}" -ne 36 ]; then
            echo "::warning::ASC_ISSUER_ID is ${#ASC_ISSUER_ID} chars; expected a 36-char UUID"
          fi

          # Team IDs are 10 alphanumeric characters. A different length here
          # usually means a whole Apple Developer account name got pasted in.
          if [ "${#APPLE_TEAM_ID}" -ne 10 ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "::warning::APPLE_TEAM_ID is ${#APPLE_TEAM_ID} chars; Apple team IDs are normally 10"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more secrets arrived empty. If they are Environment secrets, add an 'environment:' key to this job."
            exit 1
          fi

      - name: Install XcodeGen
        run: |
          # The macOS runner image ships with aws/tap pre-tapped for AWS SAM CLI.
          # Homebrew now requires explicit tap trust and warns on every brew
          # invocation. Nothing here needs that tap, so drop it.
          brew untap aws/tap || true
          brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}

      - name: Show generated project and schemes
        run: |
          ls -d *.xcodeproj
          xcodebuild -list -project "${APP_NAME}.xcodeproj"

      - name: Set build number
        run: |
          # App Store Connect permanently rejects a CFBundleVersion it has
          # already accepted. github.run_number is monotonic per workflow file,
          # so it never collides. This must happen BEFORE the archive - editing
          # a plist after signing invalidates the signature.
          #
          # Ask the project where its Info.plist is rather than guessing, since
          # XcodeGen may place it anywhere.
          plist=$(xcodebuild -showBuildSettings \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${APP_NAME}" \
            -configuration Release 2>/dev/null \
            | awk -F' = ' '/ INFOPLIST_FILE /{gsub(/^[ \t]+|[ \t\r]+$/,"",$2); print $2; exit}')

          if [ -n "$plist" ] && [ -f "$plist" ]; then
            echo "patching $plist"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$plist"
            /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$plist" | sed 's/^/CFBundleVersion now: /'
          else
            # No plist file on disk means the project uses GENERATE_INFOPLIST_FILE.
            # In that case the build-setting override in the archive step is the
            # correct mechanism and there is nothing to patch here.
            echo "no INFOPLIST_FILE on disk; relying on CURRENT_PROJECT_VERSION override"
          fi

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # CI-01: the original used `KEYCHAIN_PASSWORD: ${{ github.run_id }}`.
          # The run ID is NOT a secret - it appears in the URL of every workflow
          # run and in the REST API - so the keychain holding the Apple
          # Distribution private key was protected by a publicly known value.
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          umask 077

          # Strip ALL whitespace before decoding. Pasting into the GitHub UI
          # can introduce newlines, and a single stray character makes the
          # decoded output garbage rather than failing loudly.
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | tr -d '[:space:]' | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode > "$PP_PATH"

          echo "--- decoded file check ---"
          for f in "$CERTIFICATE_PATH:p12" "$PP_PATH:profile"; do
            path="${f%%:*}"; label="${f##*:}"
            size=$(stat -f%z "$path" 2>/dev/null || echo 0)
            echo "$label: size=${size} bytes  md5=$(md5 -q "$path" 2>/dev/null || echo n/a)"
            if [ "$size" -lt 100 ]; then
              echo "::error::Decoded $label is only ${size} bytes. The secret is empty, truncated, or not base64."
              exit 1
            fi
            # Both a .p12 and a .mobileprovision are DER, which always starts
            # with 0x30 (ASN.1 SEQUENCE). Anything else means the secret holds
            # the wrong content - a file path, PEM text, or a partial paste.
            magic=$(od -An -tx1 -N1 "$path" | tr -d " \n")
            if [ "$magic" != "30" ]; then
              echo "::error::Decoded $label does not look like DER (first byte 0x${magic}, expected 0x30). Check what was pasted into the secret."
              exit 1
            fi
          done
          echo "    both files look structurally valid"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # CI-02: the original ran three `openssl pkcs12` diagnostics here, one
          # of them `-nocerts`, which DECRYPTS THE SIGNING PRIVATE KEY and pipes
          # it in cleartext to `grep -c`. It also passed the passphrase as
          # `-passin pass:"$P12_PASSWORD"`, placing it in the process argument
          # list where any concurrent process on the runner can read it via `ps`.
          #
          # Removed. `security import` below already fails loudly on a key-less
          # .p12 and `find-identity` confirms the result, so those diagnostics
          # proved nothing that is not proven two lines later. If you do want a
          # pre-import check, read the passphrase from the environment, never
          # from argv:
          #
          #   openssl pkcs12 -in "$CERTIFICATE_PATH" -passin env:P12_PASSWORD -nokeys -noout

          # CI-03: dropped `-A`. That flag grants EVERY application on the
          # machine unprompted access to the private key. The `-T` entries
          # already grant exactly the two binaries that need it.
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -f pkcs12 \
            -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          # CI-06: append to the user search list instead of replacing it, and
          # record the original so the cleanup step can restore it.
          security list-keychains -d user | tr -d '"' | xargs > "$RUNNER_TEMP/original-keychains.txt"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(cat "$RUNNER_TEMP/original-keychains.txt")
          echo "$KEYCHAIN_PATH" > "$RUNNER_TEMP/keychain-path.txt"

          echo "--- codesigning identities in keychain ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          # Fail here rather than 10 minutes later inside xcodebuild
          if security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -q "0 valid identities found"; then
            echo "::error::No usable signing identity. The .p12 is missing its private key, or was exported with an OpenSSL 3 cipher macOS cannot read. Re-export with: openssl pkcs12 -export -legacy -inkey key.pem -in cert.pem -out cert.p12"
            exit 1
          fi

          # Decode the profile ONCE to a real file. PlistBuddy reading from
          # /dev/stdin is unreliable - it sometimes reports "file does not
          # exist" because it seeks the input.
          security cms -D -i "$PP_PATH" > "$RUNNER_TEMP/pp.plist"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/pp.plist")
          if [ -z "$UUID" ]; then
            echo "::error::Could not read UUID from provisioning profile. BUILD_PROVISION_PROFILE_BASE64 may be truncated or not a .mobileprovision."
            exit 1
          fi

          # Xcode 16+ reads from UserData; older paths kept for safety
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          cp "$PP_PATH" ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/$UUID.mobileprovision

          # Confirm these match PROVISIONING_PROFILE_NAME and BUNDLE_ID
          echo "--- provisioning profile ---"
          /usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/pp.plist"
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/pp.plist"
          /usr/libexec/PlistBuddy -c "Print :ExpirationDate" "$RUNNER_TEMP/pp.plist"

      # CI-02: build the plist via PlistBuddy from environment variables rather
      # than interpolating `${{ secrets.* }}` into a heredoc, and stop `cat`-ing
      # the result into the build log.
      - name: Generate ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          rm -f ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Save" ExportOptions.plist
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store-connect" \
            -c "Add :teamID string ${APPLE_TEAM_ID}" \
            -c "Add :signingStyle string manual" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:${BUNDLE_ID} string ${PROVISIONING_PROFILE_NAME}" \
            -c "Add :compileBitcode bool false" \
            ExportOptions.plist
          echo "ExportOptions.plist written (contents not logged)"

      - name: Show resolved signing settings
        run: |
          # Confirms what CODE_SIGN_IDENTITY / DEVELOPMENT_TEAM the project
          # actually resolved to, vs what the certificate provides.
          xcodebuild -showBuildSettings \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${APP_NAME}" \
            -configuration Release 2>/dev/null \
            | grep -E "CODE_SIGN_IDENTITY|CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE|PRODUCT_BUNDLE_IDENTIFIER" \
            | sort -u

      # ---------------------------------------------------------------------
      # Models are NOT in the repository. They are hundreds of MB to ~1.5 GB,
      # and .gitignore excludes *.gguf / *.bin / OffGrid/Resources/Models/ so
      # they never bloat a clone. Without this step every CI build produces a
      # model-less IPA that fails at inference with "model missing from this
      # build" (finding R-08).
      #
      # Set MODEL_WHISPER_URL and MODEL_LLAMA_URL as repository secrets (or
      # variables, if the hosting location is not sensitive). Any HTTPS source
      # works — a GitHub release asset, S3/GCS presigned URL, or Hugging Face.
      #
      # FILENAMES ARE LOAD-BEARING. OffGridApp.swift looks up:
      #     Bundle.main.path(forResource: "ggml-small-encoder", ofType: "bin")
      #     Bundle.main.path(forResource: "gemma-2b-q4_k_m",     ofType: "gguf")
      # A mismatch returns "" and surfaces as a missing-model error at runtime,
      # not as a build failure — so it is checked explicitly below.
      # ---------------------------------------------------------------------
      - name: Fetch on-device models
        if: ${{ !inputs.skip_models }}
        env:
          MODEL_WHISPER_URL: ${{ secrets.MODEL_WHISPER_URL }}
          MODEL_LLAMA_URL: ${{ secrets.MODEL_LLAMA_URL }}
          # Optional. Only needed if a source requires a bearer token, e.g. a
          # gated Hugging Face repo or a private bucket. Unauthenticated
          # requests against a gated repo return an HTML page rather than an
          # error status, which is exactly what the size checks below catch.
          MODEL_AUTH_TOKEN: ${{ secrets.MODEL_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          MODELS_DIR="OffGrid/Resources/Models"
          mkdir -p "$MODELS_DIR"

          # Secrets OVERRIDE these defaults. The defaults exist so a fresh
          # clone builds without any repository configuration at all.
          #
          # For production you should still set the secrets and point them at
          # your OWN mirror (a GitHub release asset, or a presigned S3/GCS
          # URL). Depending on a third party's Hugging Face repo for every
          # release build means their rename, deletion, or rate limit becomes
          # your build failure.
          WHISPER_URL="${MODEL_WHISPER_URL:-https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin}"
          LLAMA_URL="${MODEL_LLAMA_URL:-https://huggingface.co/BafS/gemma-2-2b-it-Q4_K_M-GGUF/resolve/main/gemma-2-2b-it-q4_k_m.gguf}"

          if [ -z "${MODEL_WHISPER_URL:-}" ] || [ -z "${MODEL_LLAMA_URL:-}" ]; then
            echo "::warning::Using default public model URLs. Set MODEL_WHISPER_URL / MODEL_LLAMA_URL secrets to point at your own mirror before shipping."
          fi

          # NOTE: no arrays here. macOS runners ship Bash 3.2, where
          # "${arr[@]}" on an EMPTY array under `set -u` aborts with
          # "unbound variable" — that expansion only became safe in Bash 4.4.
          # Two explicit curl invocations are duplicative but portable.
          if [ -n "${MODEL_AUTH_TOKEN:-}" ]; then
            echo "using bearer auth for model downloads"
          fi

          # Production thresholds: whisper small is ~488 MB, a 2B-class Q4_K_M
          # GGUF is ~1.5 GB. Anything dramatically under means the download
          # did not return weights.
          fetch() {
            url="$1"; dest="$2"; min="$3"; label="$4"
            echo "downloading $label"
            if [ -n "${MODEL_AUTH_TOKEN:-}" ]; then
              curl -L --fail --silent --show-error \
                -H "Authorization: Bearer ${MODEL_AUTH_TOKEN}" "$url" -o "$dest"
            else
              curl -L --fail --silent --show-error "$url" -o "$dest"
            fi
            size=$(stat -f%z "$dest" 2>/dev/null || echo 0)
            printf '    %-30s %s bytes\n' "$(basename "$dest")" "$size"
            if [ "$size" -lt "$min" ]; then
              echo "::error::$dest is only ${size} bytes (expected >= ${min}). The URL likely returned an error page or a redirect stub. If the source is a gated repo, accept its terms and set the MODEL_AUTH_TOKEN secret."
              exit 1
            fi
          }

          fetch "$WHISPER_URL" "$MODELS_DIR/ggml-small-encoder.bin" 400000000 "speech model"
          fetch "$LLAMA_URL"   "$MODELS_DIR/gemma-2b-q4_k_m.gguf"   800000000 "text model"

          echo "total model payload: $(du -sh "$MODELS_DIR" | cut -f1)"

      - name: Build and Archive App
        run: |
          xcodebuild archive \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${APP_NAME}" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            -resultBundlePath "$PWD/build/archive.xcresult" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/export"

      - name: Confirm the IPA carries the expected version
        env:
          SKIP_MODELS: ${{ inputs.skip_models }}
        run: |
          IPA=$(ls build/export/*.ipa | head -1)
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
          echo "found: $IPA ($(du -h "$IPA" | cut -f1))"

          # Read the version straight out of the signed bundle. This is the
          # value App Store Connect compares against, so checking project
          # settings instead would prove nothing.
          workdir=$(mktemp -d)
          unzip -q "$IPA" -d "$workdir"
          plist=$(ls "$workdir"/Payload/*.app/Info.plist | head -1)
          short=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$plist")
          build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$plist")
          echo "CFBundleShortVersionString: $short"
          echo "CFBundleVersion:            $build"
          if [ "$build" != "${{ github.run_number }}" ]; then
            echo "::warning::CFBundleVersion is '$build', not ${{ github.run_number }}. The 'Set build number' step did not take effect; this upload may be rejected as a duplicate."
          fi

          # -------------------------------------------------------------
          # Bundle-content checks. Without these, a build that links the
          # native engines but never EMBEDS them exports a ~300 KB IPA that
          # builds green and then dies in dyld before main() on every launch.
          # That failure is invisible to xcodebuild, so assert on it here.
          # -------------------------------------------------------------
          app=$(ls -d "$workdir"/Payload/*.app | head -1)

          echo "--- embedded frameworks ---"
          if [ ! -d "$app/Frameworks" ]; then
            echo "::error::No Frameworks/ directory in the app bundle. The SwiftPM dynamic products were linked but not embedded - the app will crash in dyld on launch. Check the 'embed: true' entries under dependencies: in project.yml."
            exit 1
          fi
          ls -lh "$app/Frameworks"

          for lib in WhisperEngine LlamaEngine; do
            if ! ls "$app/Frameworks" | grep -qi "$lib"; then
              echo "::error::$lib is missing from Frameworks/. It was linked but not embedded."
              exit 1
            fi
          done

          echo "--- bundled models ---"
          if [ "${SKIP_MODELS}" = "true" ]; then
            echo "    skipped (diagnostic build)"
          else
            for m in ggml-small-encoder.bin gemma-2b-q4_k_m.gguf; do
              if [ ! -f "$app/$m" ]; then
                echo "::error::$m is not in the app bundle. Bundle.main.path(forResource:) will return \"\" and inference will fail at runtime."
                exit 1
              fi
              printf '    %-28s %s\n' "$m" "$(du -h "$app/$m" | cut -f1)"
            done
          fi

          # Apple's hard cap is 4 GB uncompressed. Warn well before it so a
          # model swap that pushes past the limit is caught here rather than
          # by App Store Connect after a full upload.
          total_kb=$(du -sk "$app" | cut -f1)
          echo "--- total uncompressed app size: $((total_kb / 1024)) MB ---"

          # A correct build is ~20 MB with no models and ~2 GB with them.
          # Anything in the hundreds of KB means the engines are absent.
          if [ "${SKIP_MODELS}" = "true" ]; then
            floor_kb=5120        # 5 MB — engines present, models deliberately absent
          else
            floor_kb=20480       # 20 MB — engines present, models expected too
          fi

          if [ "$total_kb" -lt "$floor_kb" ]; then
            echo "::error::App is only $((total_kb / 1024)) MB, under the $((floor_kb / 1024)) MB floor. Native code and/or models are missing from the bundle."
            exit 1
          fi
          if [ "$total_kb" -gt 3670016 ]; then
            echo "::error::App is $((total_kb / 1024)) MB, over Apple's 4 GB uncompressed limit. App Store Connect will reject this build."
            exit 1
          fi

      # CI-04: pin to a SHA (see the note on the checkout step).
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-IPA
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Install App Store Connect API key
        if: inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # altool takes no path argument for the key. It scans a fixed set of
          # directories for a file named exactly AuthKey_<KEY_ID>.p8, so the
          # filename below is load-bearing.
          umask 077
          mkdir -p ~/private_keys
          KEY_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          printf '%s' "$ASC_PRIVATE_KEY" | tr -d '[:space:]' | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          # A .p8 is PEM, not DER, so the DER check used for the .p12 does not
          # apply - look for the PEM header instead.
          if ! head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded ASC_PRIVATE_KEY is not a PEM private key. Re-create the secret from the base64 of AuthKey_<KEY_ID>.p8"
            exit 1
          fi
          echo "installed $(basename "$KEY_PATH") ($(wc -c < "$KEY_PATH") bytes)"

      - name: Validate IPA against App Store Connect
        if: inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Catches missing usage-description strings, bad icon sizes and
          # duplicate build numbers in under a minute, rather than failing at
          # the end of a full upload.
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        if: inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "Upload accepted. Processing takes 5-30 minutes before the build appears in TestFlight."

      # CI-06: the original removed only the App Store Connect key. The signing
      # keychain - holding the distribution certificate AND its private key -
      # was never deleted, and the user keychain search list was never restored.
      # Harmless on ephemeral GitHub-hosted runners; a persistent credential
      # leak on a self-hosted one.
      - name: Clean up signing material
        if: always()
        run: |
          set +e
          if [ -f "$RUNNER_TEMP/original-keychains.txt" ]; then
            security list-keychains -d user -s $(cat "$RUNNER_TEMP/original-keychains.txt")
          fi
          if [ -f "$RUNNER_TEMP/keychain-path.txt" ]; then
            security delete-keychain "$(cat "$RUNNER_TEMP/keychain-path.txt")"
          fi
          rm -rf ~/private_keys
          rm -f "$RUNNER_TEMP/build_certificate.p12" \
                "$RUNNER_TEMP/build_pp.mobileprovision" \
                "$RUNNER_TEMP/pp.plist" \
                ExportOptions.plist
          exit 0

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: xcresult
          path: build/archive.xcresult
          if-no-files-found: ignore
