name: iOS Build and Export

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload the IPA to App Store Connect"
        type: boolean
        default: false

env:
  # Single source of truth. Must match `name:` and the target name in project.yml.
  APP_NAME: CapSureTranscribe
  BUNDLE_ID: com.Fortress.CapSureTranscribe

jobs:
  build:
    name: Build and Sign IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Verify submodules were fetched
        run: |
          # If these are empty, the SwiftPM targets have no sources and the
          # build fails much later with a confusing error. Fail fast instead.
          for d in ThirdParty/whisper.cpp ThirdParty/llama.cpp; do
            if [ -z "$(ls -A "$d" 2>/dev/null)" ]; then
              echo "::error::$d is empty - submodule not checked out"
              exit 1
            fi
          done

      - name: Preflight - verify secrets are reaching this job
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # Prints only character counts, never values. A length of 0 means the
          # secret is not reaching this job - most often because it is an
          # *environment* secret and the job has no `environment:` key, or it
          # was created under the Variables tab instead of Secrets.
          fail=0
          for name in APPLE_TEAM_ID PROVISIONING_PROFILE_NAME P12_PASSWORD \
                      BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64; do
            eval "val=\${$name}"
            printf '%-32s length=%s\n' "$name" "${#val}"
            if [ -z "$val" ]; then fail=1; fi
          done

          # App Store Connect secrets are only required when uploading, so they
          # are reported but do not fail the build.
          for name in ASC_KEY_ID ASC_ISSUER_ID ASC_PRIVATE_KEY; do
            eval "val=\${$name}"
            printf '%-32s length=%s\n' "$name" "${#val}"
          done

          # Key IDs are 10 chars, issuer IDs are 36-char UUIDs. Catching a
          # swapped pair here saves a confusing 401 from altool later.
          if [ -n "$ASC_KEY_ID" ] && [ "${#ASC_KEY_ID}" -ne 10 ]; then
            echo "::warning::ASC_KEY_ID is ${#ASC_KEY_ID} chars; expected 10"
          fi
          if [ -n "$ASC_ISSUER_ID" ] && [ "${#ASC_ISSUER_ID}" -ne 36 ]; then
            echo "::warning::ASC_ISSUER_ID is ${#ASC_ISSUER_ID} chars; expected a 36-char UUID"
          fi

          # Team IDs are 10 alphanumeric characters. A different length here
          # usually means a whole Apple Developer account name got pasted in.
          if [ "${#APPLE_TEAM_ID}" -ne 10 ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "::warning::APPLE_TEAM_ID is ${#APPLE_TEAM_ID} chars; Apple team IDs are normally 10"
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more secrets arrived empty. If they are Environment secrets, add an 'environment:' key to this job."
            exit 1
          fi

      - name: Install XcodeGen
        run: |
          # The macOS runner image ships with aws/tap pre-tapped for AWS SAM CLI.
          # Homebrew now requires explicit tap trust and warns loudly on every
          # brew invocation. Nothing here needs it, so drop it.
          brew untap aws/tap || true
          brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}

      - name: Show generated project and schemes
        run: |
          ls -d *.xcodeproj
          xcodebuild -list -project "${APP_NAME}.xcodeproj"

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Strip ALL whitespace before decoding. Pasting into the GitHub UI
          # can introduce newlines, and a single stray character makes the
          # decoded output garbage rather than failing loudly.
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | tr -d '[:space:]' | base64 --decode > $CERTIFICATE_PATH
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '[:space:]' | base64 --decode > $PP_PATH

          echo "--- decoded file check ---"
          for f in "$CERTIFICATE_PATH:p12" "$PP_PATH:profile"; do
            path="${f%%:*}"; label="${f##*:}"
            size=$(stat -f%z "$path" 2>/dev/null || echo 0)
            echo "$label: size=${size} bytes  md5=$(md5 -q "$path" 2>/dev/null || echo n/a)"
            if [ "$size" -lt 100 ]; then
              echo "::error::Decoded $label is only ${size} bytes. The secret is empty, truncated, or not base64."
              exit 1
            fi
            # Both a .p12 and a .mobileprovision are DER, which always starts
            # with 0x30 (ASN.1 SEQUENCE). Anything else means the secret holds
            # the wrong content - a file path, PEM text, or a partial paste.
            magic=$(od -An -tx1 -N1 "$path" | tr -d " \n")
            if [ "$magic" != "30" ]; then
              echo "::error::Decoded $label does not look like DER (first byte 0x${magic}, expected 0x30). Check what was pasted into the secret."
              exit 1
            fi
          done
          echo "    both files look structurally valid"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Inspect the .p12 BEFORE importing. A valid signing .p12 must
          # contain both a certificate AND a private key. If "PRIVATE KEY"
          # count is 0, the export was cert-only - that is the whole bug.
          echo "--- p12 contents ---"
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$P12_PASSWORD" -nokeys -passout pass:x 2>/dev/null \
            | grep -c "BEGIN CERTIFICATE" | sed 's/^/certificates: /'
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$P12_PASSWORD" -nocerts -passout pass:x 2>/dev/null \
            | grep -c "BEGIN.*PRIVATE KEY" | sed 's/^/private keys: /'
          echo "--- certificate subject ---"
          openssl pkcs12 -in $CERTIFICATE_PATH -passin pass:"$P12_PASSWORD" -nokeys -clcerts 2>/dev/null \
            | openssl x509 -noout -subject -dates 2>/dev/null || echo "could not parse certificate"

          # Note: no -t flag. Restricting to -t cert can skip the private key
          # on some .p12 files; letting security infer the type imports both.
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -f pkcs12 \
            -k $KEYCHAIN_PATH -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "--- codesigning identities in keychain ---"
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          # Fail here rather than 10 minutes later inside xcodebuild
          if security find-identity -v -p codesigning $KEYCHAIN_PATH | grep -q "0 valid identities found"; then
            echo "::error::No usable signing identity. The .p12 is missing its private key, or was exported with an OpenSSL 3 cipher macOS cannot read. Re-export with: openssl pkcs12 -export -legacy -inkey key.pem -in cert.pem -out cert.p12"
            exit 1
          fi

          # Decode the profile ONCE to a real file. PlistBuddy reading from
          # /dev/stdin is unreliable - it sometimes reports "file does not
          # exist" because it seeks the input.
          security cms -D -i $PP_PATH > $RUNNER_TEMP/pp.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/pp.plist)
          if [ -z "$UUID" ]; then
            echo "::error::Could not read UUID from provisioning profile. BUILD_PROVISION_PROFILE_BASE64 may be truncated or not a .mobileprovision."
            exit 1
          fi

          # Xcode 16+ reads from UserData; older paths kept for safety
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          cp $PP_PATH ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/$UUID.mobileprovision

          # Confirm these match PROVISIONING_PROFILE_NAME and BUNDLE_ID
          echo "--- provisioning profile ---"
          /usr/libexec/PlistBuddy -c "Print :Name" $RUNNER_TEMP/pp.plist
          /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" $RUNNER_TEMP/pp.plist
          /usr/libexec/PlistBuddy -c "Print :ExpirationDate" $RUNNER_TEMP/pp.plist

      - name: Generate ExportOptions.plist
        run: |
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>${{ secrets.PROVISIONING_PROFILE_NAME }}</string>
              </dict>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          cat ExportOptions.plist

      - name: Show resolved signing settings
        run: |
          # Confirms what CODE_SIGN_IDENTITY / DEVELOPMENT_TEAM the project
          # actually resolved to, vs what the certificate provides.
          xcodebuild -showBuildSettings \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${APP_NAME}" \
            -configuration Release 2>/dev/null \
            | grep -E "CODE_SIGN_IDENTITY|CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE|PRODUCT_BUNDLE_IDENTIFIER" \
            | sort -u

      - name: Build and Archive App
        run: |
          # CURRENT_PROJECT_VERSION drives CFBundleVersion. App Store Connect
          # permanently rejects a build number it has already accepted, and
          # github.run_number is monotonic per workflow, so it never collides.
          # REQUIRES project.yml to set CFBundleVersion: $(CURRENT_PROJECT_VERSION)
          xcodebuild archive \
            -project "${APP_NAME}.xcodeproj" \
            -scheme "${APP_NAME}" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            -resultBundlePath "$PWD/build/archive.xcresult" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/${APP_NAME}.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$PWD/build/export"

      - name: Confirm the IPA carries the expected version
        run: |
          IPA=$(ls build/export/*.ipa | head -1)
          echo "IPA_PATH=$IPA" >> "$GITHUB_ENV"
          echo "found: $IPA ($(du -h "$IPA" | cut -f1))"

          # Read the version straight out of the signed bundle. This is the
          # value App Store Connect will compare against, so checking the
          # project settings instead would prove nothing.
          workdir=$(mktemp -d)
          unzip -q "$IPA" -d "$workdir"
          plist="$workdir/Payload/${APP_NAME}.app/Info.plist"
          short=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$plist")
          build=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$plist")
          echo "CFBundleShortVersionString: $short"
          echo "CFBundleVersion:            $build"
          if [ "$build" != "${{ github.run_number }}" ]; then
            echo "::warning::CFBundleVersion is '$build', not ${{ github.run_number }}. project.yml is likely hardcoding it instead of using \$(CURRENT_PROJECT_VERSION); the next upload will be rejected as a duplicate."
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-IPA
          path: build/export/*.ipa
          if-no-files-found: error

      - name: Install App Store Connect API key
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          # altool takes no path argument for the key. It scans a fixed set of
          # directories for a file named exactly AuthKey_<KEY_ID>.p8, so the
          # filename below is load-bearing.
          mkdir -p ~/private_keys
          KEY_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          printf '%s' "$ASC_PRIVATE_KEY" | tr -d '[:space:]' | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          # A .p8 is PEM, not DER, so the DER check used for the .p12 does not
          # apply here - check for the PEM header instead.
          if ! head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded ASC_PRIVATE_KEY is not a PEM private key. Re-create the secret with: base64 -i AuthKey_XXXXXXXXXX.p8 | pbcopy"
            exit 1
          fi
          echo "installed $(basename "$KEY_PATH") ($(wc -c < "$KEY_PATH") bytes)"

      - name: Validate IPA against App Store Connect
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Catches missing usage-description strings, bad icon sizes, and
          # duplicate build numbers in under a minute, instead of failing at
          # the end of a full upload.
          xcrun altool --validate-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload to App Store Connect
        if: github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "Upload accepted. Processing takes 5-30 minutes before the build appears in TestFlight."

      - name: Remove App Store Connect API key
        if: always()
        run: rm -rf ~/private_keys

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: xcresult
          path: build/archive.xcresult
          if-no-files-found: ignore
