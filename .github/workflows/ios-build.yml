name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix ThirdParty submodules (strip main.swift / nested Package.swift)
        run: ./scripts/fix-thirdparty-submodules.sh

      - name: Wake Up Headless iOS Simulator Daemon
        # Warms up the background process to avoid the "Unable to connect to simulator" bug.
        run: |
          xcrun simctl list > /dev/null
          sleep 5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: List schemes (sanity check)
        run: xcodebuild -list -project OffGrid.xcodeproj

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project OffGrid.xcodeproj \
            -scheme OffGrid \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            GCC_PREPROCESSOR_DEFINITIONS='$(inherited) GGML_NO_ACCELERATE=1 GGML_USE_CPU=1' \
            OTHER_SWIFT_FLAGS="-Xfrontend -serialize-debugging-options"
