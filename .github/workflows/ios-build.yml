# Save this file as: .github/workflows/ios-build.yml in your repo root
#
# What this does: on every push/PR, spins up a macOS runner with Xcode
# preinstalled, checks out your repo (pulling in the whisper.cpp/llama.cpp
# submodules), and does a simulator build with code signing turned off —
# so it works with zero Apple Developer account setup. This is a compile
# check, not a device install: you get pass/fail + full build logs, no
# visual simulator output.
#
# BEFORE THIS WILL WORK, replace the two placeholders below:
#   OffGrid.xcodeproj  -> your actual .xcodeproj (or .xcworkspace) name
#   OffGrid            -> your actual scheme name
# Find both by running `xcodebuild -list` inside your project folder
# once you're on any Mac session, or just check what Xcode named them
# when the project was created.

name: iOS Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls in ThirdParty/whisper.cpp and ThirdParty/llama.cpp

      - name: Fix ThirdParty submodules (strip main.swift / nested Package.swift)
        # See scripts/fix-thirdparty-submodules.sh for the full explanation.
        # This is REQUIRED every time the submodules are freshly checked
        # out -- without it, package resolution fails with "library
        # product 'WhisperEngine'/'LlamaEngine' should not contain
        # executable targets".
        run: ./scripts/fix-thirdparty-submodules.sh

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode version
        # macos-15 runners ship several Xcode versions side by side.
        # Pin one explicitly so builds don't silently shift when GitHub
        # updates the runner image. Adjust the version to whatever the
        # previous step lists as available.
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        # This is what replaces "open Xcode and create a new project" —
        # reads project.yml and writes OffGrid.xcodeproj fresh on the
        # runner, every run. Nobody commits the generated .xcodeproj itself.
        run: xcodegen generate

      - name: List schemes (sanity check)
        run: xcodebuild -list -project OffGrid.xcodeproj

      - name: Show installed simulator runtimes and devices
        # Debugging aid for exactly the failure this workflow used to hit:
        # a hardcoded 'name=iPhone 16,OS=latest' destination silently not
        # resolving to anything on this runner/Xcode combination. GitHub's
        # macos-15 image ships several Xcode versions side by side, and
        # simulator runtimes aren't always fully provisioned for whichever
        # one you xcode-select into -- this prints exactly what IS
        # available so a future failure here is easy to diagnose from the
        # log instead of guessing.
        run: |
          xcrun simctl list runtimes
          echo "---"
          xcrun simctl list devices available

      - name: Resolve an available iOS Simulator destination
        # Don't hardcode a device name + "OS=latest": if the runner image
        # doesn't have that exact pairing provisioned, xcodebuild fails
        # with "Unable to find a destination matching..." before the build
        # even starts. Instead, pick whatever iOS simulator actually
        # exists on this runner right now and build against its UDID.
        # (Single-line jq here on purpose -- a multi-line embedded script
        # inside a YAML block scalar has to stay indented at or beyond the
        # block's baseline indentation on every line, which is an easy way
        # to accidentally break the workflow's YAML, as happened here.)
        id: destination
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available -j | jq -r '
            .devices
            | to_entries[]
            | select(.key | test("iOS"))
            | .value[]
            | select(.isAvailable)
            | .udid
          ' | head -n1)
          if [ -z "$UDID" ]; then
            echo "No available iOS Simulator found on this runner -- see the runtimes/devices list in the previous step." >&2
            exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project OffGrid.xcodeproj \
            -scheme OffGrid \
            -sdk iphonesimulator \
            -destination "id=${{ steps.destination.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore
