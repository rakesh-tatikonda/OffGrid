# Save as: project.yml in your repo root (same level as the OffGrid/ folder
# and ThirdParty/). This is NOT the Xcode project itself — it's a spec that
# XcodeGen reads to *generate* OffGrid.xcodeproj. You never hand-edit the
# generated .xcodeproj; you edit this file and regenerate.
#
# CHANGE BEFORE FIRST BUILD:
#   bundleIdPrefix below — pick your own reverse-DNS id, e.g. com.yourname

name: OffGrid

options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  OffGridNativeEngines:
    path: ThirdParty   # the local Package.swift wrapping whisper.cpp/llama.cpp

targets:
  OffGrid:
    type: application
    platform: iOS

    sources:
      - path: OffGrid
        excludes:
          - "Resources/Info.plist.excerpt.xml"   # folded into generated Info.plist below, not compiled

    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: OffGrid/OffGrid-Bridging-Header.h
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.offgrid
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_BITCODE: NO
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"

    # Generates the real Info.plist from these keys directly — encodes the
    # same "no background modes, no ATS exceptions" intent as the excerpt
    # file, so there's nothing left to hand-merge.
    info:
      path: OffGrid/Resources/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UIFileSharingEnabled: false
        LSSupportsOpeningDocumentsInPlace: false
        UILaunchScreen: {}

    dependencies:
      - package: OffGridNativeEngines
        product: WhisperEngine
      - package: OffGridNativeEngines
        product: LlamaEngine
