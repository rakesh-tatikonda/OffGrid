name: CapSureTranscribe

options:
  bundleIdPrefix: com.Fortress.CapSureTranscribe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  OffGridNativeEngines:
    path: ThirdParty   # the local Package.swift wrapping whisper.cpp/llama.cpp

targets:
  CapSureTranscribe:
    type: application
    platform: iOS

    sources:
      - path: OffGrid
        excludes:
          - "Resources/Info.plist.excerpt.xml"   # folded into generated Info.plist below, not compiled

    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: OffGrid/OffGrid-Bridging-Header.h
        PRODUCT_BUNDLE_IDENTIFIER: com.Fortress.CapSureTranscribe
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_BITCODE: NO
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        # Names the app icon set inside Assets.xcassets. Without this the
        # catalog still compiles but no CFBundleIconName is emitted, which is
        # App Store error 90713 - and the 120x120/152x152 PNGs Apple looks for
        # are never generated either (90022 / 90023).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/ThirdParty/whisper.cpp/ggml/include"
          - "$(SRCROOT)/ThirdParty/llama.cpp/ggml/include"
        OTHER_LDFLAGS: ["-lc++"]
        # Signing applies ONLY to this app target. The SwiftPM library targets
        # (WhisperEngine/LlamaEngine) must NOT receive a provisioning profile —
        # they're embedded frameworks and get re-signed with this identity.
        # Values are injected from GitHub secrets when `xcodegen generate` runs.
        DEVELOPMENT_TEAM: "${APPLE_TEAM_ID}"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "${PROVISIONING_PROFILE_NAME}"

    # Generates the real Info.plist from these keys directly — encodes the
    # same "no background modes, no ATS exceptions" intent as the excerpt
    # file, so there's nothing left to hand-merge.
    info:
      path: OffGrid/Resources/Info.plist
      properties:
        CFBundleDisplayName: "CapSureTranscribe"
        ITSAppUsesNonExemptEncryption: false
        UIFileSharingEnabled: false
        LSSupportsOpeningDocumentsInPlace: false
        UILaunchScreen: {}
        # XcodeGen defaults CFBundleVersion to the literal "1" when it is not
        # declared here. Pointing both at build settings lets CI override them
        # on the xcodebuild command line, so each upload gets a fresh number.
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        # Apple requires an explicit orientation list; omitting it is error
        # 90474. The ~ipad variant must name all four, since iPad multitasking
        # is only satisfied by full rotation support.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    # Both products are declared `.library(type: .dynamic)` in
    # ThirdParty/Package.swift, so they must be EMBEDDED in the app bundle,
    # not merely linked. Linking alone satisfies the build but leaves the
    # dylibs out of Payload/…app/Frameworks/, which produces a ~300 KB IPA
    # that dies in dyld before main() with:
    #     dyld[…]: Library not loaded: @rpath/libWhisperEngine.dylib
    #     Termination Reason: DYLD, [1] Library missing
    #
    # Do NOT "fix" this by switching Package.swift to .static — whisper.cpp
    # and llama.cpp each vendor their own copy of ggml, so static linking
    # both yields duplicate-symbol errors on ggml_*. The dynamic split is
    # deliberate.
    #
    # VERIFY after `xcodegen generate`: open the project, select the
    # CapSureTranscribe target -> General -> "Frameworks, Libraries, and
    # Embedded Content". Both products must read "Embed & Sign". If XcodeGen's
    # `embed` key is not honoured for package products in your version, add
    # them there manually, or add an explicit Copy Files phase with
    # destination "Frameworks".
    dependencies:
      - package: OffGridNativeEngines
        product: WhisperEngine
        embed: true
        codeSign: true
      - package: OffGridNativeEngines
        product: LlamaEngine
        embed: true
        codeSign: true

# Explicit shared scheme. Without this, XcodeGen emits no scheme and
# `xcodebuild -scheme CapSureTranscribe` can fail in CI with
# "The project does not contain a scheme named CapSureTranscribe"
# (Xcode only auto-creates schemes when the project is opened in the IDE).
schemes:
  CapSureTranscribe:
    build:
      targets:
        CapSureTranscribe: all
    run:
      config: Debug
    archive:
      config: Release
